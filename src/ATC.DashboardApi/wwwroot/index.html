<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Traffic Control — Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; }
        #map { width: 100%; height: 100%; }

        #status-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.92); color: #94a3b8;
            padding: 8px 16px; font-size: 13px;
            display: flex; align-items: center; gap: 16px;
            backdrop-filter: blur(8px);
        }
        #status-bar .title { color: #38bdf8; font-weight: 700; font-size: 15px; }
        #status-bar a { color: #94a3b8; text-decoration: none; padding: 4px 12px; border-radius: 4px; transition: all 0.2s; font-size: 13px; }
        #status-bar a:hover { color: #e2e8f0; background: #1e293b; }
        #status-bar a.active { color: #38bdf8; background: rgba(56, 189, 248, 0.12); }
        #status-bar .stat { color: #e2e8f0; }
        #status-bar .dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 4px;
        }
        .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .dot-red   { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
        .dot-yellow { background: #eab308; box-shadow: 0 0 6px #eab308; }

        .flight-tooltip {
            background: rgba(15, 23, 42, 0.95) !important;
            border: 1px solid #334155 !important;
            color: #e2e8f0 !important;
            border-radius: 6px !important;
            font-size: 12px !important;
            padding: 8px 12px !important;
            line-height: 1.5 !important;
        }
        .flight-tooltip .callsign { color: #38bdf8; font-weight: 700; font-size: 13px; }
        .flight-tooltip .label { color: #94a3b8; }
        .flight-tooltip .val { color: #f1f5f9; font-weight: 500; }
        .flight-tooltip .country { color: #a78bfa; }
        .flight-tooltip .vr-up { color: #22c55e; }
        .flight-tooltip .vr-dn { color: #ef4444; }

        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95) !important;
            border: 1px solid #334155 !important;
            color: #e2e8f0 !important;
            border-radius: 8px !important;
            font-size: 12px !important;
        }
        .leaflet-popup-tip { background: rgba(15, 23, 42, 0.95) !important; }
        .leaflet-popup-content { margin: 10px 14px !important; line-height: 1.6 !important; }
        .route-info .airport { color: #34d399; font-weight: 700; font-size: 14px; }
        .route-info .arrow { color: #64748b; margin: 0 6px; }
        .route-info .loading { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>
    <div id="status-bar">
        <span class="title">ATC Radar</span>
        <a href="/" class="active">Live Map</a>
        <a href="/metrics.html">Metrics</a>
        <span>Status: <span class="dot dot-yellow" id="conn-dot"></span><span id="conn-status">Connecting…</span></span>
        <span>Aircraft: <span class="stat" id="aircraft-count">0</span></span>
        <span>Updates/s: <span class="stat" id="update-rate">0</span></span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
    (function () {
        "use strict";

        // ─── Map Setup ───────────────────────────────────────────
        const map = L.map("map", { zoomControl: true }).setView([47.6, -122.3], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // ─── Aircraft Markers ────────────────────────────────────
        const markers = {};       // icao24 -> L.marker
        const STALE_MS = 300_000;         // remove live-tracked after 5 min
        const STALE_ESTIMATED_MS = 1_800_000; // keep estimated (oceanic) up to 30 min

        // Normalise compact-JSON wire format into readable keys used by all UI code.
        // Accepts both compact (cs, lat, lon, …) and legacy (callsign, latitude, …) shapes.
        function normalise(f) {
            return {
                icao24:        f.icao24,
                callsign:      f.cs      ?? f.callsign      ?? "",
                latitude:      f.lat     ?? f.latitude       ?? 0,
                longitude:     f.lon     ?? f.longitude      ?? 0,
                altitude:      f.alt     ?? f.altitude       ?? 0,
                velocity:      f.vel     ?? f.velocity       ?? 0,
                trueTrack:     f.trk     ?? f.trueTrack      ?? 0,
                verticalRate:  f.vr      ?? f.verticalRate   ?? 0,
                onGround:      f.gnd     ?? f.onGround       ?? false,
                originCountry: f.cty     ?? f.originCountry  ?? "",
                lastUpdate:    f.ts      ?? f.lastUpdate     ?? 0
            };
        }

        function createPlaneIcon(heading, isWarning, isEstimated) {
            const color = isWarning ? "#ef4444" : isEstimated ? "#64748b" : "#38bdf8";
            const opacity = isEstimated ? "0.55" : "0.95";
            const svg = `
                <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                    <g transform="rotate(${heading}, 14, 14)">
                        <path d="M14 3 L18 22 L14 18 L10 22 Z"
                              fill="${color}" stroke="#0f172a" stroke-width="1"
                              opacity="${opacity}"/>
                    </g>
                </svg>`;
            return L.divIcon({
                html: svg,
                className: "",
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }

        function formatTooltip(f) {
            const cs = f.callsign || f.icao24;
            const alt = Math.round(f.altitude);
            const spd = Math.round(f.velocity * 1.944); // m/s -> knots
            const hdg = Math.round(f.trueTrack);
            const vr = Math.round(f.verticalRate || 0);
            const vrClass = vr > 0 ? 'vr-up' : vr < 0 ? 'vr-dn' : '';
            const vrStr = vr > 0 ? `+${vr}` : `${vr}`;
            const country = f.originCountry || '';
            const ground = f.onGround ? ' <span class="label">[ON GROUND]</span>' : '';
            // Check if this marker is estimated
            const m = markers[f.icao24];
            const est = m && m.estimated ? ' <span style="color:#eab308;font-size:10px;">[ESTIMATED]</span>' : '';
            return `<div class="flight-tooltip">
                <span class="callsign">${sanitize(cs)}</span>${ground}${est}<br/>
                <span class="label">ICAO:</span> <span class="val">${sanitize(f.icao24)}</span>
                ${country ? `| <span class="country">${sanitize(country)}</span>` : ''}<br/>
                <span class="label">Alt:</span> <span class="val">${alt.toLocaleString()} ft</span>
                <span class="label">Spd:</span> <span class="val">${spd} kts</span><br/>
                <span class="label">Hdg:</span> <span class="val">${hdg}°</span>
                <span class="label">V/S:</span> <span class="val ${vrClass}">${vrStr} ft/m</span><br/>
                <span class="label" style="font-size:10px;">Click for details</span>
            </div>`;
        }

        function sanitize(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        // Route cache to avoid repeat lookups
        const routeCache = {};

        async function onFlightClick(icao) {
            const data = markers[icao];
            if (!data) return;
            const f = data.flight;
            const cs = (f.callsign || "").trim();
            const marker = data.marker;

            // Build initial popup with flight details
            let html = `<div class="route-info">
                <b style="color:#38bdf8;font-size:14px;">${sanitize(cs || f.icao24)}</b><br/>
                <span class="label">ICAO:</span> ${sanitize(f.icao24)}<br/>
                <span class="label">Country:</span> <span style="color:#a78bfa;">${sanitize(f.originCountry || 'N/A')}</span><br/>
                <span class="label">Position:</span> ${f.latitude.toFixed(4)}°, ${f.longitude.toFixed(4)}°<br/>
                <span class="label">Altitude:</span> ${Math.round(f.altitude).toLocaleString()} ft<br/>
                <span class="label">Speed:</span> ${Math.round(f.velocity * 1.944)} kts<br/>
                <span class="label">Heading:</span> ${Math.round(f.trueTrack)}°<br/>`;

            html += `<hr style="border-color:#334155;margin:6px 0;"/>`;
            html += `<div id="popup-extra-${sanitize(f.icao24)}"><span class="loading">Loading details…</span></div>`;
            html += `</div>`;

            marker.unbindPopup();
            marker.bindPopup(html, { maxWidth: 320, className: '' }).openPopup();

            // Fetch aircraft info + route in parallel
            const extraEl = `popup-extra-${f.icao24}`;
            const [aircraftInfo, routeInfo] = await Promise.all([
                fetchAircraftInfo(f.icao24),
                cs ? fetchRouteInfo(cs) : Promise.resolve(null)
            ]);

            let extra = '';

            // Aircraft info section
            if (aircraftInfo && aircraftInfo.Registration) {
                extra += `<span class="label">Reg:</span> <span style="color:#22d3ee;font-weight:600;">${sanitize(aircraftInfo.Registration)}</span>`;
                if (aircraftInfo.Type)
                    extra += ` <span style="color:#94a3b8;">(${sanitize(aircraftInfo.Manufacturer || '')} ${sanitize(aircraftInfo.Type)})</span>`;
                extra += `<br/>`;
                if (aircraftInfo.RegisteredOwners)
                    extra += `<span class="label">Operator:</span> <span style="color:#a78bfa;">${sanitize(aircraftInfo.RegisteredOwners)}</span><br/>`;
            }

            // Route section
            if (routeInfo) {
                extra += formatRoute(routeInfo);
            } else if (cs) {
                extra += `<span class="label">Route:</span> <span style="color:#94a3b8;">Unknown</span>`;
            }

            if (!extra) extra = `<span style="color:#94a3b8;">No additional info available</span>`;

            // Update popup content
            const updatedHtml = html.replace(
                `<div id="popup-extra-${sanitize(f.icao24)}"><span class="loading">Loading details…</span></div>`,
                `<div id="${extraEl}">${extra}</div>`
            );
            marker.setPopupContent(updatedHtml);
        }

        // Aircraft info cache
        const aircraftCache = {};
        async function fetchAircraftInfo(icao24) {
            if (aircraftCache[icao24]) return aircraftCache[icao24];
            try {
                const resp = await fetch(`/aircraft/${encodeURIComponent(icao24)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.Registration) aircraftCache[icao24] = data;
                    return data;
                }
            } catch (e) { console.warn("Aircraft lookup failed:", e); }
            return null;
        }

        async function fetchRouteInfo(callsign) {
            if (routeCache[callsign]) return routeCache[callsign];
            try {
                const resp = await fetch(`/route/${encodeURIComponent(callsign)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    routeCache[callsign] = data;
                    return data;
                }
            } catch (e) { console.warn("Route lookup failed:", e); }
            return null;
        }

        function formatRoute(data) {
            // Handle adsbdb.com response format
            const fr = data?.response?.flightroute;
            if (fr && fr.origin && fr.destination) {
                const origin = fr.origin;
                const dest = fr.destination;
                let html = '';
                if (fr.airline)
                    html += `<span class="label">Airline:</span> <span style="color:#fbbf24;">${sanitize(fr.airline.name)}</span><br/>`;
                html += `<span class="label">Route:</span> `;
                html += `<span class="airport">${sanitize(origin.iata_code)}</span>`;
                html += `<span class="arrow"> → </span>`;
                html += `<span class="airport">${sanitize(dest.iata_code)}</span><br/>`;
                html += `<span style="font-size:10px;color:#94a3b8;">${sanitize(origin.name)}</span><br/>`;
                html += `<span style="font-size:10px;color:#94a3b8;">${sanitize(dest.name)}</span>`;
                return html;
            }

            // Legacy format (array of airport codes)
            if (data?.route && data.route.length > 0) {
                const airports = data.route.map(a => `<span class="airport">${sanitize(a)}</span>`);
                return `<span class="label">Route:</span> ${airports.join('<span class="arrow"> → </span>')}`;
            }

            return `<span class="label">Route:</span> <span style="color:#94a3b8;">Unknown</span>`;
        }

        function upsertMarker(raw, isEstimated = false) {
            const flight = normalise(raw);
            const key = flight.icao24;
            const latlng = [flight.latitude, flight.longitude];
            const icon = createPlaneIcon(flight.trueTrack || 0, false, isEstimated);

            if (markers[key]) {
                markers[key].marker.setLatLng(latlng);
                markers[key].marker.setIcon(icon);
                markers[key].marker.setTooltipContent(formatTooltip(flight));
                if (!isEstimated) markers[key].lastSeen = Date.now();
                markers[key].flight = flight;
                markers[key].estimated = isEstimated;
            } else {
                const m = L.marker(latlng, { icon: icon })
                    .addTo(map)
                    .bindTooltip(formatTooltip(flight), {
                        className: "flight-tooltip",
                        direction: "top",
                        offset: [0, -14]
                    });
                m.on('click', () => onFlightClick(key));
                markers[key] = { marker: m, lastSeen: Date.now(), flight: flight, estimated: isEstimated };
            }
        }

        // ─── Position Extrapolation ──────────────────────────────
        // Every 5s, move markers that haven't had a live update recently
        // by projecting forward using their last known velocity + heading.
        setInterval(() => {
            const now = Date.now();
            for (const [key, data] of Object.entries(markers)) {
                const f = data.flight;
                const ageSec = (now - data.lastSeen) / 1000;
                // Only extrapolate airborne flights with velocity, heading, and stale > 30s
                if (ageSec < 30 || f.onGround || !f.velocity || f.velocity < 10) continue;

                const speedDeg = f.velocity / 111_320; // m/s to degrees (approx)
                const hdgRad = (f.trueTrack || 0) * Math.PI / 180;
                const dt = 5; // seconds per tick

                const newLat = f.latitude + speedDeg * Math.cos(hdgRad) * dt;
                const newLon = f.longitude + speedDeg * Math.sin(hdgRad) * dt / Math.cos(f.latitude * Math.PI / 180);

                f.latitude = Math.max(-85, Math.min(85, newLat));
                f.longitude = ((newLon + 540) % 360) - 180;

                const icon = createPlaneIcon(f.trueTrack || 0, false, true);
                data.marker.setLatLng([f.latitude, f.longitude]);
                data.marker.setIcon(icon);
                data.estimated = true;
            }
        }, 5_000);

        // Cleanup stale markers every 15s
        setInterval(() => {
            const now = Date.now();
            for (const [key, data] of Object.entries(markers)) {
                const age = now - data.lastSeen;
                const maxAge = data.estimated ? STALE_ESTIMATED_MS : STALE_MS;
                if (age > maxAge) {
                    map.removeLayer(data.marker);
                    delete markers[key];
                }
            }
            document.getElementById("aircraft-count").textContent = Object.keys(markers).length;
        }, 15_000);

        // ─── Update Rate Tracking ────────────────────────────────
        let updateCount = 0;
        setInterval(() => {
            document.getElementById("update-rate").textContent = updateCount;
            updateCount = 0;
        }, 1000);

        // ─── Initial Load from REST API ──────────────────────────
        async function loadInitialData() {
            try {
                const b = map.getBounds();
                const params = new URLSearchParams({
                    swLat: b.getSouth().toFixed(4),
                    swLng: b.getWest().toFixed(4),
                    neLat: b.getNorth().toFixed(4),
                    neLng: b.getEast().toFixed(4)
                });
                const resp = await fetch(`/radar?${params}`);
                if (!resp.ok) return;
                const flights = await resp.json();
                flights.forEach(f => upsertMarker(f));
                document.getElementById("aircraft-count").textContent = Object.keys(markers).length;
            } catch (err) {
                console.warn("Initial radar load failed:", err);
            }
        }

        // ─── SignalR Connection ──────────────────────────────────
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/flighthub")
            .withAutomaticReconnect([0, 1000, 3000, 5000, 10000])
            .configureLogging(signalR.LogLevel.Warning)
            .build();

        connection.on("FlightUpdated", (flight) => {
            upsertMarker(flight);
            updateCount++;
            document.getElementById("aircraft-count").textContent = Object.keys(markers).length;
        });

        connection.on("FlightBatchUpdated", (flights) => {
            flights.forEach(f => upsertMarker(f));
            updateCount += flights.length;
            document.getElementById("aircraft-count").textContent = Object.keys(markers).length;
        });

        function setStatus(text, dotClass) {
            document.getElementById("conn-status").textContent = text;
            const dot = document.getElementById("conn-dot");
            dot.className = "dot " + dotClass;
        }

        connection.onreconnecting(() => setStatus("Reconnecting…", "dot-yellow"));
        connection.onreconnected(() => setStatus("Connected", "dot-green"));
        connection.onclose(() => setStatus("Disconnected", "dot-red"));

        async function startConnection() {
            try {
                await connection.start();
                setStatus("Connected", "dot-green");
                console.log("SignalR connected");
            } catch (err) {
                setStatus("Disconnected", "dot-red");
                console.error("SignalR connection error:", err);
                setTimeout(startConnection, 3000);
            }
        }

        loadInitialData();
        startConnection();

        // Reload visible flights when user pans or zooms the map
        map.on('moveend', loadInitialData);

        // Poll /radar periodically to reconcile state (catches flights missed by SignalR)
        setInterval(loadInitialData, 30_000);
    })();
    </script>
</body>
</html>
